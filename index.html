<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马年·乾坤五子棋</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>马年·乾坤五子棋</h1>
            <div class="game-mode">
                <button class="mode-btn" id="single-player">单机模式</button>
                <button class="mode-btn" id="multi-player">联机模式</button>
                <button class="mode-btn" id="watch-mode">观赛模式</button>
            </div>
        </header>
        
        <div class="game-board" id="game-board">
            <!-- 棋盘将通过JavaScript生成 -->
        </div>
        
        <div class="game-info">
            <div class="player-info">
                <div class="player player1">
                    <div class="player-avatar red-horse"></div>
                    <div class="player-name">红马</div>
                    <div class="player-status active">当前回合</div>
                </div>
                <div class="player player2">
                    <div class="player-avatar blue-horse"></div>
                    <div class="player-name">蓝马</div>
                    <div class="player-status"></div>
                </div>
            </div>
            
            <div class="skill-cards">
                <h3>技能卡</h3>
                <div class="cards">
                    <div class="skill-card" id="skill1">
                        <div class="skill-icon">🐎</div>
                        <div class="skill-name">马踏飞燕</div>
                        <div class="skill-desc">移动对方任意一个棋子一步</div>
                    </div>
                    <div class="skill-card" id="skill2">
                        <div class="skill-icon">🔒</div>
                        <div class="skill-name">画地为牢</div>
                        <div class="skill-desc">封锁对方两个交叉点</div>
                    </div>
                    <div class="skill-card" id="skill3">
                        <div class="skill-icon">🍀</div>
                        <div class="skill-name">福运加身</div>
                        <div class="skill-desc">本局首次落子必成活三</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="game-controls">
            <button class="control-btn" id="restart">重新开始</button>
            <button class="control-btn" id="undo">悔棋</button>
            <button class="control-btn" id="settings">设置</button>
        </div>
        
        <div class="game-modal" id="game-modal">
            <div class="modal-content">
                <h2 id="modal-title">游戏结束</h2>
                <p id="modal-message">红马获胜！</p>
                <div class="modal-buttons">
                    <button class="modal-btn" id="play-again">再来一局</button>
                    <button class="modal-btn" id="back-to-menu">返回菜单</button>
                </div>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
